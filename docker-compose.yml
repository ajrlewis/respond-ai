services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    security_opt:
      - seccomp=unconfined
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-respondai}
      POSTGRES_USER: ${POSTGRES_USER:-respondai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-respondai}
    ports:
      - "5432:5432"
    volumes:
      - respondai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-respondai} -d ${POSTGRES_DB:-respondai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    security_opt:
      - seccomp=unconfined
    volumes:
      - ./data:/app/data:ro
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://respondai:respondai@postgres:5432/respondai}
      CHECKPOINT_DATABASE_URL: ${DOCKER_CHECKPOINT_DATABASE_URL:-postgresql://respondai:respondai@postgres:5432/respondai}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-1}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LARGE_LLM_MODEL: ${LARGE_LLM_MODEL:-gpt-4o}
      SMALL_LLM_MODEL: ${SMALL_LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  respondai_pgdata:
